<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>你的多肉，就是你</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8aab8a;
    --sage-light: #b8d4b8;
    --sage-pale: #e8f0e8;
    --terracotta: #c4785a;
    --terracotta-light: #e8a882;
    --dusty-rose: #d4a0a0;
    --cream: #faf7f2;
    --warm-white: #f5f0eb;
    --dark: #2a2520;
    --mid: #5c5248;
    --light-mid: #8c7e72;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ===== INTRO SCREEN ===== */
  #intro {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #intro.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.05);
  }
  .intro-deco {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .intro-deco::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(138,171,138,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
    animation: pulse 4s ease-in-out infinite;
  }
  .intro-deco::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,120,90,0.12) 0%, transparent 70%);
    bottom: -50px; left: -80px;
    animation: pulse 4s ease-in-out infinite 2s;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .intro-plant-ring {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    animation: floatRing 3s ease-in-out infinite;
  }
  @keyframes floatRing {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .intro-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--sage-light);
    opacity: 0.6;
  }
  .intro-dot:nth-child(2) { background: var(--dusty-rose); width: 14px; height: 14px; opacity: 0.8; }
  .intro-dot:nth-child(3) { background: var(--terracotta-light); opacity: 0.7; }
  .intro-dot:nth-child(4) { background: #a8c4d4; width: 12px; height: 12px; opacity: 0.7; }
  .intro-dot:nth-child(5) { background: var(--sage); opacity: 0.6; }
  .intro-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .intro-sub {
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: rgba(250,247,242,0.5);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 60px;
  }
  .intro-btn {
    border: 1px solid rgba(250,247,242,0.3);
    color: var(--cream);
    padding: 14px 40px;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s;
    border-radius: 40px;
    animation: btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(138,171,138,0); }
    50% { box-shadow: 0 0 0 8px rgba(138,171,138,0.15); }
  }
  .intro-btn:hover {
    background: rgba(138,171,138,0.2);
    border-color: var(--sage-light);
  }
  /* ===== MAIN PAGE ===== */
  #main { display: none; }
  #main.show { display: block; }
  .page-header {
    text-align: center;
    padding: 60px 20px 30px;
    background: linear-gradient(to bottom, var(--dark) 0%, var(--warm-white) 100%);
    position: relative;
    overflow: hidden;
  }
  .header-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(138,171,138,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(196,120,90,0.06) 0%, transparent 60%);
  }
  .page-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.08em;
    position: relative;
    margin-bottom: 10px;
  }
  .page-header p {
    font-size: 0.9rem;
    color: rgba(250,247,242,0.55);
    letter-spacing: 0.15em;
    position: relative;
    margin-bottom: 50px;
  }
  .scroll-hint {
    font-size: 0.78rem;
    color: var(--light-mid);
    letter-spacing: 0.1em;
    position: relative;
  }
  /* ===== PLANT GRID ===== */
  .plant-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    padding: 24px 16px 80px;
    max-width: 480px;
    margin: 0 auto;
  }
  .plant-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 20px rgba(42,37,32,0.08);
    animation: cardEnter 0.6s ease both;
    position: relative;
  }
  .plant-card:nth-child(1) { animation-delay: 0.05s; }
  .plant-card:nth-child(2) { animation-delay: 0.1s; }
  .plant-card:nth-child(3) { animation-delay: 0.15s; }
  .plant-card:nth-child(4) { animation-delay: 0.2s; }
  .plant-card:nth-child(5) { animation-delay: 0.25s; }
  .plant-card:nth-child(6) { animation-delay: 0.3s; }
  .plant-card:nth-child(7) { animation-delay: 0.35s; }
  .plant-card:nth-child(8) { animation-delay: 0.4s; }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .plant-card:active {
    transform: scale(0.96);
  }
  .plant-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 32px rgba(42,37,32,0.14);
  }
  .plant-visual {
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Individual plant CSS art */
  .plant-shrek .plant-visual { background: linear-gradient(135deg, #2d5a2d 0%, #4a8c4a 50%, #6ab56a 100%); }
  .plant-otome .plant-visual { background: linear-gradient(135deg, #e8d0d8 0%, #f0e0e8 50%, #d8c0d0 100%); }
  .plant-manren .plant-visual { background: linear-gradient(135deg, #4a7a5a 0%, #7aaa8a 50%, #9abaa0 100%); }
  .plant-mitao .plant-visual { background: linear-gradient(135deg, #b8d8d0 0%, #d8ece8 50%, #c8e4e0 100%); }
  .plant-nuju .plant-visual { background: linear-gradient(135deg, #d0e0d0 0%, #e8f0e8 50%, #b8d0c0 100%); }
  .plant-blue .plant-visual { background: linear-gradient(135deg, #a8c4d4 0%, #c8dce8 50%, #b8d4e4 100%); }
  .plant-daruma .plant-visual { background: linear-gradient(135deg, #e8e8e8 0%, #f4f4f0 50%, #d8d8d8 100%); }
  .plant-sakura .plant-visual { background: linear-gradient(135deg, #3a6a2a 0%, #6aaa3a 50%, #8aca4a 100%); }
  /* SVG plant illustrations */
  .plant-svg {
    width: 90px;
    height: 110px;
    position: relative;
    z-index: 2;
  }
  .plant-card-info {
    padding: 14px 16px 16px;
  }
  .plant-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .plant-keyword {
    font-size: 0.72rem;
    color: var(--light-mid);
    letter-spacing: 0.08em;
  }
  .plant-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .plant-shrek .plant-tag { background: #e8f4e8; color: #3a6a3a; }
  .plant-otome .plant-tag { background: #fce8f0; color: #8a4060; }
  .plant-manren .plant-tag { background: #e8f4ec; color: #2a6040; }
  .plant-mitao .plant-tag { background: #e8f4f0; color: #2a6060; }
  .plant-nuju .plant-tag { background: #f0ecf4; color: #5a4070; }
  .plant-blue .plant-tag { background: #e4eef8; color: #2a4870; }
  .plant-daruma .plant-tag { background: #f4f4f0; color: #5a5050; }
  .plant-sakura .plant-tag { background: #f0f8e8; color: #3a6020; }
  /* ===== RESULT SCREEN ===== */
  #result {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    overflow-y: auto;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #result.show {
    display: block;
  }
  #result.visible {
    opacity: 1;
  }
  .result-hero {
    height: 55vw;
    max-height: 320px;
    min-height: 200px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result-hero-bg {
    position: absolute;
    inset: 0;
  }
  .result-plant-art {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 120px;
    height: 140px;
    animation: resultFloat 4s ease-in-out infinite;
  }
  @keyframes resultFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-12px) rotate(1deg); }
  }
  .result-content {
    padding: 30px 24px 100px;
    max-width: 480px;
    margin: 0 auto;
  }
  .result-badge {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    padding: 5px 14px;
    border-radius: 30px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .result-name {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2rem, 9vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--dark);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .result-latin {
    font-size: 0.8rem;
    color: var(--light-mid);
    letter-spacing: 0.1em;
    margin-bottom: 30px;
    font-style: italic;
  }
  .result-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--sage-light), transparent);
    margin: 24px 0;
  }
  .result-section-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--light-mid);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .result-personality {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    font-weight: 600;
    line-height: 1.8;
    color: var(--dark);
    margin-bottom: 20px;
  }
  .result-desc {
    font-size: 0.92rem;
    line-height: 2;
    color: var(--mid);
    margin-bottom: 24px;
  }
  .result-quote-box {
    border-radius: 16px;
    padding: 24px;
    margin: 24px 0;
    position: relative;
  }
  .result-quote-box::before {
    content: '"';
    font-family: Georgia, serif;
    font-size: 5rem;
    position: absolute;
    top: -10px;
    left: 16px;
    line-height: 1;
    opacity: 0.15;
  }
  .result-quote {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    line-height: 1.9;
    font-weight: 400;
    position: relative;
    z-index: 1;
  }
  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0 24px;
  }
  .trait-chip {
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 30px;
    letter-spacing: 0.05em;
    border: 1px solid;
  }
  .result-care {
    background: var(--warm-white);
    border-radius: 16px;
    padding: 20px;
    margin-top: 24px;
  }
  .result-care h4 {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: var(--dark);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }
  .care-items {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .care-item {
    font-size: 0.78rem;
    color: var(--mid);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.5;
  }
  .care-icon {
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .back-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: var(--cream);
    border: none;
    padding: 14px 40px;
    border-radius: 40px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    z-index: 300;
    box-shadow: 0 8px 30px rgba(42,37,32,0.3);
    transition: all 0.3s;
  }
  .back-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 40px rgba(42,37,32,0.4); }
  /* Animated particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: float-particle linear infinite;
    opacity: 0;
  }
  @keyframes float-particle {
    0% { transform: translateY(100%) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }
  /* Color themes per plant */
  .theme-shrek { --accent: #4a8c4a; --accent-light: #e8f4e8; --accent-text: #2a5a2a; }
  .theme-otome { --accent: #c080a0; --accent-light: #fce8f0; --accent-text: #7a3060; }
  .theme-manren { --accent: #5a9a6a; --accent-light: #e8f4ec; --accent-text: #2a5a40; }
  .theme-mitao { --accent: #5a9090; --accent-light: #e0f0f0; --accent-text: #2a5a60; }
  .theme-nuju { --accent: #9080c0; --accent-light: #f0ecf8; --accent-text: #4a3080; }
  .theme-blue { --accent: #5080b0; --accent-light: #e0ecf8; --accent-text: #2a4070; }
  .theme-daruma { --accent: #9090a0; --accent-light: #f0f0f4; --accent-text: #404050; }
  .theme-sakura { --accent: #6aa030; --accent-light: #eef8e0; --accent-text: #3a6010; }
  .result-badge { background: var(--accent-light); color: var(--accent-text); }
  .result-quote-box { background: var(--accent-light); color: var(--accent-text); }
  .result-quote { color: var(--accent-text); }
  .result-quote-box::before { color: var(--accent); }
  .trait-chip { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); opacity: 0.85; }
  /* Ripple effect */
  @keyframes ripple {
    0% { transform: scale(0); opacity: 0.4; }
    100% { transform: scale(4); opacity: 0; }
  }
  .ripple-circle {
    position: absolute;
    border-radius: 50%;
    animation: ripple 0.6s ease-out forwards;
    pointer-events: none;
  }
  /* Mobile optimizations */
  @media (max-width: 360px) {
    .plant-grid { gap: 12px; padding: 18px 12px 60px; }
    .plant-visual { height: 130px; }
  }
</style>
</head>
<body>
<!-- INTRO -->
<div id="intro" onclick="enterMain()">
  <div class="intro-deco"></div>
  <div class="intro-plant-ring">
    <div class="intro-dot"></div>
    <div class="intro-dot"></div>
    <div class="intro-dot"></div>
    <div class="intro-dot"></div>
    <div class="intro-dot"></div>
  </div>
  <h1 class="intro-title">你的多肉<br>就是你</h1>
  <p class="intro-sub">SUCCULENT · SOUL · STORY</p>
  <button class="intro-btn">選一盆，認識自己 →</button>
</div>
<!-- MAIN PAGE -->
<div id="main">
  <div class="page-header">
    <div class="header-bg"></div>
    <h1>你的多肉，就是你</h1>
    <p>選一株最心動的多肉植物</p>
    <div class="scroll-hint">↓ 點選你的緣分多肉</div>
  </div>
  <div class="plant-grid">
    <!-- 1. 史瑞克 -->
    <div class="plant-card plant-shrek" onclick="showResult('shrek')">
      <div class="plant-visual">
        <svg class="plant-svg" viewBox="0 0 90 110" fill="none">
          <ellipse cx="45" cy="95" rx="22" ry="8" fill="#5a3a2a" opacity="0.6"/>
          <rect x="38" y="55" width="14" height="42" rx="7" fill="#5aaa50"/>
          <rect x="24" y="48" width="12" height="36" rx="6" fill="#4a9a40" transform="rotate(-8,30,66)"/>
          <rect x="54" y="50" width="12" height="34" rx="6" fill="#5aaa50" transform="rotate(7,60,67)"/>
          <rect x="30" y="38" width="11" height="32" rx="5.5" fill="#6ab460" transform="rotate(-15,35,54)"/>
          <rect x="50" y="36" width="11" height="30" rx="5.5" fill="#4a9a40" transform="rotate(12,55,51)"/>
          <rect x="18" y="55" width="10" height="28" rx="5" fill="#5aaa50" transform="rotate(-20,23,69)"/>
          <rect x="62" y="56" width="10" height="26" rx="5" fill="#6ab460" transform="rotate(18,67,69)"/>
          <circle cx="41" cy="62" r="2" fill="white" opacity="0.3"/>
          <circle cx="27" cy="56" r="1.5" fill="white" opacity="0.25"/>
          <circle cx="55" cy="58" r="1.5" fill="white" opacity="0.25"/>
        </svg>
      </div>
      <div class="plant-card-info">
        <div class="plant-name">史瑞克</div>
        <div class="plant-keyword">自由靈魂</div>
        <span class="plant-tag">獨一無二</span>
      </div>
    </div>
    <!-- 2. 乙女心 -->
    <div class="plant-card plant-otome" onclick="showResult('otome')">
      <div class="plant-visual">
        <svg class="plant-svg" viewBox="0 0 90 110" fill="none">
          <ellipse cx="45" cy="98" rx="20" ry="7" fill="#8a4a3a" opacity="0.4"/>
          <ellipse cx="45" cy="78" rx="10" ry="14" fill="#e0b8c8" transform="rotate(0,45,78)"/>
          <ellipse cx="28" cy="72" rx="9" ry="13" fill="#d4aac0" transform="rotate(-40,28,72)"/>
          <ellipse cx="62" cy="72" rx="9" ry="13" fill="#e8c0cc" transform="rotate(40,62,72)"/>
          <ellipse cx="20" cy="58" rx="8" ry="12" fill="#c8a0b8" transform="rotate(-70,20,58)"/>
          <ellipse cx="70" cy="58" rx="8" ry="12" fill="#d8b0c4" transform="rotate(70,70,58)"/>
          <ellipse cx="35" cy="48" rx="8" ry="11" fill="#e0b8c8" transform="rotate(-100,35,48)"/>
          <ellipse cx="55" cy="48" rx="8" ry="11" fill="#c8a0b8" transform="rotate(100,55,48)"/>
          <ellipse cx="45" cy="65" rx="4" ry="4" fill="#e08090" opacity="0.7"/>
          <ellipse cx="28" cy="62" rx="3.5" ry="3.5" fill="#d07080" opacity="0.6"/>
          <ellipse cx="62" cy="62" rx="3.5" ry="3.5" fill="#e090a0" opacity="0.6"/>
          <ellipse cx="45" cy="56" rx="5" ry="6" fill="#f0d0dc"/>
          <ellipse cx="45" cy="50" rx="3" ry="4" fill="#f8e0ea"/>
        </svg>
      </div>
      <div class="plant-card-info">
        <div class="plant-name">乙女心</div>
        <div class="plant-keyword">溫柔純真</div>
        <span class="plant-tag">嬰兒手指</span>
      </div>
    </div>
    <!-- 3. 蔓蓮 -->
    <div class="plant-card plant-manren" onclick="showResult('manren')">
      <div class="plant-visual">
        <svg class="plant-svg" viewBox="0 0 90 110" fill="none">
          <ellipse cx="45" cy="98" rx="24" ry="8" fill="#4a6040" opacity="0.5"/>
          <ellipse cx="45" cy="68" rx="11" ry="14" fill="#7abaa0"/>
          <ellipse cx="30" cy="65" rx="10" ry="13" fill="#6aaa90" transform="rotate(-30,30,65)"/>
          <ellipse cx="60" cy="65" rx="10" ry="13" fill="#7abaa0" transform="rotate(30,60,65)"/>

function enterMain() {
  const intro = document.getElementById('intro');
  const main = document.getElementById('main');
  intro.classList.add('hidden');
  setTimeout(() => {
    intro.style.display = 'none';
    main.classList.add('show');
  }, 800);
}
function showResult(key) {
  const p = plants[key];
  const result = document.getElementById('result');
  const heroBg = document.getElementById('resultHeroBg');
  const plantArt = document.getElementById('resultPlantArt');
  const content = document.getElementById('resultContent');
  result.className = '';
  result.classList.add(p.theme);
  heroBg.style.background = p.heroBg;
  plantArt.innerHTML = p.svg;
  const traitsHtml = p.traits.map(t => `<span class="trait-chip">${t}</span>`).join('');
  const careHtml = p.care.map(c => `<div class="care-item"><span class="care-icon">${c.icon}</span><span>${c.text}</span></div>`).join('');
  const quoteLines = p.quote.split('\n').join('<br>');
  const personalityLines = p.personality.split('\n').join('<br>');
  content.innerHTML = `
    <span class="result-badge">${p.badge}</span>
    <div class="result-name">${p.name}</div>
    <div class="result-latin">${p.latin}</div>
    <div class="result-divider"></div>
    <div class="result-section-label">你的人格</div>
    <div class="result-personality">${personalityLines}</div>
    <div class="result-desc">${p.desc}</div>
    <div class="result-section-label">你的特質</div>
    <div class="result-traits">${traitsHtml}</div>
    <div class="result-quote-box">
      <div class="result-quote">${quoteLines}</div>
    </div>
    <div class="result-divider"></div>
    <div class="result-care">
      <h4>🌵 照顧你的方式</h4>
      <div class="care-items">${careHtml}</div>
    </div>
  `;
  result.style.display = 'block';
  setTimeout(() => {
    result.classList.add('visible');
    window.scrollTo(0, 0);
    result.scrollTo(0, 0);
  }, 20);
  spawnParticles(p.theme);
}
function spawnParticles(theme) {
  const colors = {
    'theme-shrek': ['#6aaa60','#4a8c4a','#8aca70'],
    'theme-otome': ['#e8c0d0','#d070a0','#f0d0e0'],
    'theme-manren': ['#7aaa98','#5a8a70','#9abab0'],
    'theme-mitao': ['#b0dcd8','#e07880','#80c0b8'],
    'theme-nuju': ['#c0d8c0','#d090b8','#a0b0a8'],
    'theme-blue': ['#b8d0e4','#80a8c8','#d0e8f4'],
    'theme-daruma': ['#e8e8e0','#d0d0c8','#c8a0b0'],
    'theme-sakura': ['#72be50','#f07090','#50a830'],
  };
  const cols = colors[theme] || ['#8aab8a'];
  const result = document.getElementById('result');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 10;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      left:${Math.random()*100}%;
      bottom: 0;
      animation: float-particle ${6+Math.random()*8}s linear infinite;
      animation-delay: ${Math.random()*5}s;
      opacity: 0;
    `;
    result.appendChild(p);
  }
  setTimeout(() => {
    const old = result.querySelectorAll('.particle');
    old.forEach((el, i) => { if (i < old.length - 16) el.remove(); });
  }, 5000);
}
function closeResult() {
  const result = document.getElementById('result');
  result.classList.remove('visible');
  setTimeout(() => {
    result.style.display = 'none';
    result.querySelectorAll('.particle').forEach(p => p.remove());
  }, 500);
}
